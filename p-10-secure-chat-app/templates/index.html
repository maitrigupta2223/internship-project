<!DOCTYPE html>
<html>
<head>
    <title>Secure Chat</title>

    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }

        h2 {
            color: #333;
        }

        input {
            padding: 8px;
            margin: 5px;
            width: 200px;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
        }

        #chat {
            border: 1px solid black;
            height: 250px;
            overflow-y: auto;
            padding: 10px;
            background: white;
        }
    </style>
</head>
<body>

<h2>🔐 Secure Chat with E2EE</h2>

<input id="username" placeholder="Enter username">
<br><br>

<input id="message" placeholder="Type message">
<button onclick="sendMessage()">Send</button>

<h3>💬 Messages:</h3>
<ul id="chat"></ul>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
<script src="/static/script.js"></script>

</body>
</html>
